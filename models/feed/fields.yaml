fields:
    name:
        label: 'Feed Name'
        span: left
        type: text
        comment: 'A human-readable name for this feed.'
    code:
        label: 'Feed Code'
        span: right
        type: text
        preset:
            field: name
            type: slug
        comment: 'Unique slug used to reference this feed in components.'
    page_id:
        label: 'Facebook Page ID'
        span: left
        type: text
        comment: 'The numeric Facebook Page ID (for reference). The Page access token below determines which page is synced.'
    sync_frequency:
        label: 'Sync Frequency'
        span: right
        type: dropdown
        comment: 'How often posts should be synced from Facebook.'
    access_token:
        label: 'Page Access Token'
        span: full
        type: password
        comment: 'A long-lived Facebook PAGE access token (not a User token). In Graph API Explorer, select the page under "User or Page" before generating the token. Stored encrypted.'
    is_active:
        label: 'Active'
        span: left
        type: switch
        comment: 'Inactive feeds are skipped during scheduled sync.'
    last_synced_at:
        label: 'Last Synced At'
        span: right
        type: datepicker
        mode: datetime
        readOnly: true
        comment: 'Set automatically after each sync run.'
