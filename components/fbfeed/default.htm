{% if posts is not empty %}
<div class="fb-feed-wrapper">
    <div id="fb-posts-grid" class="fb-feed">
        {% for post in posts %}
            {% partial __SELF__ ~ '::_post' post=post %}
        {% endfor %}
    </div>

    <div id="fb-load-more-wrap" class="fb-load-more-wrap"{% if not hasMore %} style="display:none"{% endif %}>
        <button id="fb-load-more-btn" class="fb-load-more-btn" type="button"
            data-handler="{{ __SELF__ }}::onLoadMore">
            <span class="fb-load-more-label">Load More</span>
            <span class="fb-load-more-spinner" style="display:none"></span>
        </button>
    </div>
</div>
{% else %}
    <p class="fb-feed-empty">No posts to display.</p>
{% endif %}
